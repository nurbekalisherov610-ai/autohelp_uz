# ============================================
# AutoHelp.uz — Docker Compose Configuration
# Production-ready setup with all services
# ============================================

version: "3.9"

services:
  # ── Bot Application ─────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autohelp_bot
    restart: always
    env_file:
      - .env
    environment:
      # Override hosts to point to Docker service names
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - bot_logs:/app/logs
      - backups:/var/backups/autohelp
    networks:
      - autohelp_net

  # ── PostgreSQL 16 ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: autohelp_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-autohelp}
      POSTGRES_USER: ${DB_USER:-autohelp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-autohelp_user} -d ${DB_NAME:-autohelp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - autohelp_net

  # ── Redis 7 ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: autohelp_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --save 300 100
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autohelp_net

  # ── Uptime Kuma (Monitoring) ────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: autohelp_monitor
    restart: always
    volumes:
      - uptime_data:/app/data
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - autohelp_net

# ── Volumes ───────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: autohelp_postgres_data
  redis_data:
    name: autohelp_redis_data
  bot_logs:
    name: autohelp_bot_logs
  backups:
    name: autohelp_backups
  uptime_data:
    name: autohelp_uptime_data

# ── Network ───────────────────────────────────────────────────────
networks:
  autohelp_net:
    name: autohelp_network
    driver: bridge
